<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">A</div>
      <h1>AMOLED Black</h1>
    </div>

    <div class="section" id="lang-section">
      <div class="segmented-control">
        <button class="seg-btn" data-value="en" data-lang="en" id="lang-en">EN</button>
        <button class="seg-btn active" data-value="tr" data-lang="tr" id="lang-tr">TR</button>
      </div>
    </div>

    <div class="toggle-section">
      <span class="label" data-i18n="extensionActive">Extension Active</span>
      <label class="switch">
        <input type="checkbox" id="enabled" checked>
        <span class="slider-toggle"></span>
      </label>
    </div>

    <div class="section" id="brightness-section">
      <div class="section-header">
        <span class="label" data-i18n="textBrightness">Text Brightness</span>
        <span class="value" id="brightness-value">75%</span>
      </div>
      <input type="range" id="brightness" min="10" max="100" value="75" class="range-slider">
    </div>

    <div class="section" id="bg-mode-section">
      <span class="label" data-i18n="bgMode">Background Mode</span>
      <div class="segmented-control">
        <button class="seg-btn active" data-value="pure" data-i18n="pureBlack" id="bg-pure">Pure Black</button>
        <button class="seg-btn" data-value="soft" data-i18n="soft" id="bg-soft">Soft</button>
      </div>
    </div>

    <div class="section" id="contrast-section">
      <span class="label" data-i18n="contrastLevel">Contrast Level</span>
      <div class="segmented-control">
        <button class="seg-btn" data-value="low" data-i18n="low" id="contrast-low">Low</button>
        <button class="seg-btn active" data-value="normal" data-i18n="normal" id="contrast-normal">Normal</button>
        <button class="seg-btn" data-value="high" data-i18n="high" id="contrast-high">High</button>
      </div>
    </div>

    <div class="section" id="image-section">
      <div class="toggle-row">
        <span class="label" data-i18n="imageFiltering">Image Filtering</span>
        <label class="switch">
          <input type="checkbox" id="image-filter">
          <span class="slider-toggle"></span>
        </label>
      </div>
      <div class="sub-section" id="image-brightness-section" style="display:none;">
        <div class="section-header">
          <span class="sub-label" data-i18n="imageBrightness">Image Brightness</span>
          <span class="value" id="image-brightness-value">80%</span>
        </div>
        <input type="range" id="image-brightness" min="10" max="100" value="80" class="range-slider">
      </div>
    </div>

    <div class="section" id="custom-css-section">
      <span class="label" data-i18n="customCSS">Custom CSS</span>
      <textarea id="custom-css" data-i18n-placeholder="customCSSPlaceholder" rows="4"></textarea>
    </div>

    <div class="footer">
      <span class="version">v1.1.0</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
