<!DOCTYPE html>
<html>
<head><title>Generate AMOLED Black Icons</title></head>
<body>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.1;
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#00ff88';
  ctx.font = `bold ${size * 0.6}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('A', size / 2, size / 2);
  const link = document.createElement('a');
  link.download = size + '.png';
  link.href = canvas.toDataURL();
  link.textContent = size + 'px icon';
  document.body.appendChild(document.createElement('br'));
  document.body.appendChild(link);
}
drawIcon(document.getElementById('c16'), 16);
drawIcon(document.getElementById('c48'), 48);
drawIcon(document.getElementById('c128'), 128);
</script>
</body>
</html>
